# Local dev Postgres for worktree development (replaces per-worktree Neon
# branches). Port 5434 — 5432/5433 are already in use on this machine.
# Point each worktree's .env.local DATABASE_URL at this; prod stays on Neon.
services:
  postgres:
    image: postgres:17-alpine
    container_name: sociallama-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sociallama_dev
    ports:
      - '5434:5432'
    volumes:
      - sociallama-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d sociallama_dev']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sociallama-pgdata:
